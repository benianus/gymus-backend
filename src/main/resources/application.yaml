spring:
  application:
    name: gymus-server-java

  datasource:
    url: jdbc:postgresql://localhost:5432/gym_management_system
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    validate-on-migrate: true
    baseline-on-migrate: true
    locations:
      - classpath:db/migration

jwt:
  key: ${SECRET_KEY}
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000


servlet:
  multipart:
    enabled: true
    max-file-size: 10MB
    max-request-size: 10MB

file:
  upload-dir: uploads
